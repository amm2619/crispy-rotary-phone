name: Deploy Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install function dependencies
        working-directory: functions
        run: npm install

      - name: Write .env from secrets
        working-directory: functions
        run: |
          cat > .env <<EOF
          NUTRITIONIX_APP_ID=${{ secrets.NUTRITIONIX_APP_ID }}
          NUTRITIONIX_APP_KEY=${{ secrets.NUTRITIONIX_APP_KEY }}
          EOF

      - name: Authenticate to Google Cloud
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/sa-key.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa-key.json" >> "$GITHUB_ENV"

      - name: Deploy nutrients function
        run: npx firebase-tools deploy --only functions:nutrients --project records-app-c778b --non-interactive --force
